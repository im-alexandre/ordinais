version: '3.7'

services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    command: gunicorn project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/usr/src/app/staticfiles
    expose:
      - 8000
    env_file:
      - ./.env.prod
    depends_on:
      - db
  db:
    image: postgres:12.0-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env.prod.db

  electre_mor:
    build:
      context: ./electre_mor
      dockerfile: Dockerfile.prod
    command: gunicorn electre_mor_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume_electre_mor:/usr/src/app/staticfiles
    expose:
      - 8000
    env_file:
      - ./.env.prod
    depends_on:
      - db
        
  nginx:
    build: ./nginx
    volumes:
      - static_volume:/usr/app/src/staticfiles
      - static_volume_electre_mor:/usr/app/src/staticfiles_electre_mor
    ports:
      - 80:80
    depends_on:
      - web
      - electre_mor

volumes:
  postgres_data:
  static_volume:
  static_volume_electre_mor:
